<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS V36 FINAL - MATTHIEU PRO</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #050505; --neon: #00f2ff; --win: #00ff88; --loss: #ff0044; --gold: #ffcc00; }
        body { font-family: 'Orbitron', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; background: #000; border: 1px solid #1a1a1a; border-radius: 20px; padding: 15px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); }
        .user-sig { text-align: center; font-size: 24px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold); margin-bottom: 15px; }

        .tf-grid { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 15px; }
        .tf-box { flex: 1; background: #0a0a0a; border: 1px solid #151515; padding: 10px; border-radius: 10px; text-align: center; font-size: 9px; }
        .status-txt { display: block; margin-top: 5px; font-weight: bold; color: #333; }

        #chart-container { height: 230px; width: 100%; margin-bottom: 15px; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .live-price { text-align: center; font-size: 36px; font-weight: 900; color: white; margin-bottom: 10px; font-family: monospace; }

        .monitor-area { height: 180px; background: #000; border-radius: 15px; border: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .sig-res { font-size: 45px; font-weight: 900; }

        .targets { display: flex; width: 90%; justify-content: space-between; margin-top: 15px; border-top: 1px solid #111; padding-top: 10px; }
        .val { font-family: monospace; font-size: 14px; font-weight: bold; }

        button { 
            width: 100%; padding: 22px; margin-top: 15px; border-radius: 15px; border: none; 
            background: white; color: black; font-weight: 900; font-size: 18px; cursor: pointer; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <div class="user-sig">MATTHIEU EDITION</div>

    <div class="tf-grid">
        <div class="tf-box">ANALYSE 4H <span id="s-4h" class="status-txt">---</span></div>
        <div class="tf-box">FLUX 30M <span id="s-30m" class="status-txt">---</span></div>
        <div class="tf-box">CONFIRM 15M <span id="s-15m" class="status-txt">---</span></div>
    </div>

    <div class="live-price" id="price-now">0.00000</div>
    <div id="chart-container"></div>

    <div class="monitor-area" id="mainBox">
        <div id="msg" style="color:#555; font-size: 11px;">PRÊT POUR LE SCAN PRO</div>
        <div id="result-ui" style="display:none; text-align:center; width: 100%;">
            <div class="sig-res" id="sig-val">---</div>
            <div class="targets">
                <div style="text-align:left"><span style="color:#666; font-size:10px">TAKE PROFIT</span><br><span class="val" style="color:var(--win)" id="tp-val">0.00000</span></div>
                <div style="text-align:right"><span style="color:#666; font-size:10px">STOP LOSS</span><br><span class="val" style="color:var(--loss)" id="sl-val">0.00000</span></div>
            </div>
        </div>
    </div>

    <button id="snipe-btn" onclick="executeMatthieuAlgo()">ANALYSER MAINTENANT</button>
</div>

<script>
    let candleSeries;
    let currentPrice = 0;
    
    // 1. Initialisation Graphique Immédiate
    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { backgroundColor: '#000000', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#050505' }, horzLines: { color: '#050505' } },
        timeScale: { borderColor: '#111' },
    });
    candleSeries = chart.addCandlestickSeries({ upColor: '#00ff88', downColor: '#ff0044', borderVisible: false, wickUpColor: '#00ff88', wickDownColor: '#ff0044' });

    // 2. Connexion Marché (Deriv)
    const ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1');
    ws.onopen = () => {
        ws.send(JSON.stringify({ "ticks_history": "frxEURUSD", "count": 50, "end": "latest", "style": "candles", "subscribe": 1 }));
    };

    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.candles) {
            const candles = data.candles.map(c => ({ time: c.epoch, open: c.open, high: c.high, low: c.low, close: c.close }));
            candleSeries.setData(candles);
        }
        if (data.tick) {
            currentPrice = data.tick.quote;
            document.getElementById('price-now').innerText = currentPrice.toFixed(5);
            candleSeries.update({ time: Math.floor(Date.now()/1000), open: currentPrice, high: currentPrice+0.00001, low: currentPrice-0.00001, close: currentPrice });
        }
    };

    // 3. ANALYSE TOP-DOWN (Se lance au clic)
    async function executeMatthieuAlgo() {
        const btn = document.getElementById('snipe-btn');
