<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEGIS V36 PRO - MATTHIEU EDITION</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
:root { --bg:#030303; --neon:#00f2ff; --win:#00ff88; --loss:#ff0044; --gold:#ffcc00; }

body {
    background: var(--bg);
    color: white;
    font-family: Arial;
    display:flex;
    justify-content:center;
}

.container {
    width:100%;
    max-width:420px;
}

.price-now {
    text-align:center;
    font-size:30px;
    margin:10px 0;
}

#chart-container {
    height:250px;
}

button {
    width:100%;
    padding:15px;
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="price-now" id="price">0.00000</div>
<div id="chart-container"></div>

<button onclick="analyse()">ANALYSER</button>

<div id="result"></div>

</div>

<script>

// ==========================
// 📊 CHART
// ==========================
const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
    layout: { backgroundColor: '#000', textColor: '#fff' }
});

const candleSeries = chart.addCandlestickSeries();

let candles = [];
let prices = [];

// ==========================
// 🔌 WEBSOCKET DERIV
// ==========================
const ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1');

ws.onopen = () => {
    ws.send(JSON.stringify({
        ticks_history: "frxEURUSD",
        style: "candles",
        count: 100,
        granularity: 60
    }));
};

ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    if (data.candles) {
        candles = data.candles.map(c => ({
            time: c.epoch,
            open: +c.open,
            high: +c.high,
            low: +c.low,
            close: +c.close
        }));

        candleSeries.setData(candles);
        prices = candles.map(c => c.close);

        document.getElementById("price").innerText = prices[prices.length-1].toFixed(5);
    }
};

// ==========================
// 📈 INDICATEURS
// ==========================

// EMA
function EMA(data, period) {
    let k = 2 / (period + 1);
    let ema = data[0];

    for (let i = 1; i < data.length; i++) {
        ema = data[i] * k + ema * (1 - k);
    }
    return ema;
}

// RSI
function RSI(data, period = 14) {
    let gains = 0, losses = 0;

    for (let i = data.length - period; i < data.length - 1; i++) {
        let diff = data[i + 1] - data[i];
        if (diff >= 0) gains += diff;
        else losses -= diff;
    }

    let rs = gains / losses;
    return 100 - (100 / (1 + rs));
}

// ==========================
// 🧠 ANALYSE PRO
// ==========================
function analyse() {

    if (prices.length < 50) return;

    const ema20 = EMA(prices, 20);
    const ema50 = EMA(prices, 50);
    const rsi = RSI(prices);

    const last = prices[prices.length - 1];
    const prev = prices[prices.length - 2];

    let trend = ema20 > ema50 ? "HAUSSIER" : "BAISSIER";

    let signal = "ATTENTE";

    if (trend === "HAUSSIER" && rsi < 70 && last > prev) {
        signal = "ACHAT (CALL)";
    }

    if (trend === "BAISSIER" && rsi > 30 && last < prev) {
        signal = "VENTE (PUT)";
    }

    // 📊 Volatilité
    const volatility = Math.abs(prices[prices.length-1] - prices[prices.length-10]);

    let tp, sl;

    if (signal.includes("ACHAT")) {
        tp = last + volatility;
        sl = last - (volatility / 2);
    } else if (signal.includes("VENTE")) {
        tp = last - volatility;
        sl = last + (volatility / 2);
    }

    // ==========================
    // 📢 AFFICHAGE
    // ==========================
    document.getElementById("result").innerHTML = `
        <h3>Tendance: ${trend}</h3>
        <h2>Signal: ${signal}</h2>
        <p>RSI: ${rsi.toFixed(2)}</p>
        <p>TP: ${tp ? tp.toFixed(5) : "-"}</p>
        <p>SL: ${sl ? sl.toFixed(5) : "-"}</p>
    `;
}

</script>

</body>
</html>
