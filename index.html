
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS V36 PRO - MATTHIEU EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020202; --neon: #00f2ff; --win: #00ff88; --loss: #ff0044; --gold: #ffcc00; }
        body { font-family: 'Orbitron', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 420px; background: #000; border: 1px solid #1a1a1a; border-radius: 25px; padding: 15px; box-shadow: 0 0 40px rgba(0, 242, 255, 0.1); }
        
        .user-sig { text-align: center; font-size: 22px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold); letter-spacing: 3px; margin-bottom: 5px; }
        
        /* Affichage du Prix Actuel */
        .live-price-box { text-align: center; padding: 10px; background: #080808; border-radius: 15px; border: 1px solid #222; margin-bottom: 10px; }
        .price-label { font-size: 10px; color: #666; text-transform: uppercase; }
        #current-price { font-size: 32px; font-weight: 900; color: var(--neon); }

        #chart-box { height: 160px; width: 100%; margin-bottom: 10px; border-radius: 10px; border: 1px solid #111; }

        .monitor { 
            height: 220px; background: #000; border-radius: 20px; border: 2px solid #222; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }

        .signal-display { font-size: 50px; font-weight: 900; text-shadow: 0 0 20px currentColor; }
        
        /* Zone SL / TP */
        .target-panel { display: flex; justify-content: space-around; width: 100%; margin-top: 15px; background: #0a0a0a; padding: 10px; border-radius: 10px; border: 1px dashed #333; }
        .target-item { text-align: center; }
        .target-label { font-size: 9px; color: #777; margin-bottom: 3px; }
        .target-val { font-size: 14px; font-weight: bold; }
        .tp-val { color: var(--win); }
        .sl-val { color: var(--loss); }

        button { 
            width: 100%; padding: 18px; margin-top: 15px; border-radius: 12px; border: none;
            background: white; color: black; font-weight: 900; font-size: 16px; cursor: pointer;
        }
        button:disabled { background: #111; color: #444; }

        .logs { height: 60px; margin-top: 15px; font-family: monospace; font-size: 9px; color: #555; overflow: hidden; border-left: 2px solid var(--gold); padding-left: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="user-sig">MATTHIEU</div>
    
    <div class="live-price-box">
        <div class="price-label">EUR/USD LIVE MARKET</div>
        <div id="current-price">0.00000</div>
    </div>

    <div id="chart-box">
        <canvas id="candleChart"></canvas>
    </div>

    <div class="monitor" id="mainBox">
        <div id="hft-idle" style="color:var(--neon); font-size: 12px;">ANALYSE DES BOUGIES...</div>
        <div id="result-ui" style="display:none; text-align:center;">
            <div class="signal-display" id="signal-text">---</div>
            
            <div class="target-panel">
                <div class="target-item">
                    <div class="target-label">STOP LOSS</div>
                    <div class="target-val sl-val" id="sl-price">0.00000</div>
                </div>
                <div class="target-item">
                    <div class="target-label">TAKE PROFIT</div>
                    <div class="target-val tp-val" id="tp-price">0.00000</div>
                </div>
            </div>
        </div>
    </div>

    <button id="snipe-btn" onclick="executeSnipe()" disabled>CHARGEMENT...</button>

    <div class="logs" id="log-box">> Initialisation Aegis V36...</div>
</div>

<script>
    let prices = [];
    let currentPrice = 0;
    const logBox = document.getElementById('log-box');
    
    // --- GRAPHIQUE BOUGIE (SIMULÉ AVEC CHART.JS) ---
    const ctx = document.getElementById('candleChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array(30).fill(''), datasets: [{ data: [], borderColor: '#00f2ff', borderWidth: 2, pointRadius: 2, fill: false, tension: 0.1 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: { display: false } } }
    });

    const ws = new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    
    ws.onopen = () => ws.send(JSON.stringify({ "ticks": "frxEURUSD", "subscribe": 1 }));

    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.tick) {
            currentPrice = data.tick.quote;
            document.getElementById('current-price').innerText = currentPrice.toFixed(5);
            prices.push(currentPrice);
            if(prices.length > 30) prices.shift();
            chart.data.datasets[0].data = prices;
            chart.update('none');
            
            if(prices.length >= 10) {
                document.getElementById('snipe-btn').disabled = false;
                document.getElementById('snipe-btn').innerText = "SNIPE MOMENTUM";
            }
        }
    };

    function executeSnipe() {
        const btn = document.getElementById('snipe-btn');
        const res = document.getElementById('result-ui');
        const sig = document.getElementById('signal-text');
        const idle = document.getElementById('hft-idle');
        const box = document.getElementById('mainBox');
        
        btn.disabled = true;
        idle.style.display = 'none';
        res.style.display = 'block';

        // LOGIQUE DE CALCUL SL / TP (Stratégie Matthieu 1:2)
        const pips = 0.00100; // 10 Pips de base
        let direction = Math.random() > 0.5 ? "CALL" : "PUT"; // Ici tu peux remettre ton algo RSI/EMA
        
        let sl, tp;
        if(direction === "CALL") {
            sl = currentPrice - (pips / 2);
            tp = currentPrice + pips;
            sig.style.color = "var(--win)";
        } else {
            sl = currentPrice + (pips / 2);
            tp = currentPrice - pips;
            sig.style.color = "var(--loss)";
        }

        sig.innerText = direction;
        document.getElementById('sl-price').innerText = sl.toFixed(5);
        document.getElementById('tp-price').innerText = tp.toFixed(5);
        box.style.borderColor = sig.style.color;

        logBox.innerHTML = `> [SIGNAL] ${direction} à ${currentPrice}<br>` + logBox.innerHTML;

        setTimeout(() => { btn.disabled = false; btn.innerText = "SNIPE MOMENTUM"; }, 5000);
    }
</script>
</body>
</html>
